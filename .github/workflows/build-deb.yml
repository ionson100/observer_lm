name: Build Cross-Platform Release

on:
  push:
    tags:
      - 'v*'

# 1. ДОБАВЛЕНО: Разрешаем запись контента (нужно для создания релизов)
permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish EXE
        run: dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o ./publish-win

      - name: Copy help.html
        # В Windows лучше использовать shell: pwsh (по умолчанию) и команду cp или copy
        run: cp ./observerLm/help.html ./publish-win/help.html

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./publish-win/*.exe
            ./publish-win/help.html
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish Linux Binaries
        run: dotnet publish -c Release -r linux-x64 --self-contained true -p:PublishSingleFile=true -o ./temp-bin

      - name: Build DEB Package
        run: |
          CLEAN_VERSION=$(echo ${GITHUB_REF_NAME} | sed 's/v//')
          sed -i "s/^Version:.*$/Version: $CLEAN_VERSION/" ./observerlm-deb/DEBIAN/control
          mkdir -p ./observerlm-deb/usr/local/bin/
          cp ./temp-bin/observerLm ./observerlm-deb/usr/local/bin/
          chmod +x ./observerlm-deb/usr/local/bin/observerLm
          chmod -R 755 ./observerlm-deb/DEBIAN/
          dpkg-deb --build observerlm-deb "observerlm-${CLEAN_VERSION}-linux-x64.deb"

      - name: Upload DEB to Release
        uses: softprops/action-gh-release@v1
        with:
          files: "*.deb"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
