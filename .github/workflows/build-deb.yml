

name: Build Cross-Platform Release

on:
  push:
    tags:
      - 'v*' # Запуск при пуше тега, например v1.0.0

jobs:
  # --- СБОРКА WINDOWS ---
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish EXE
        # Собираем SingleFile EXE со сжатием и обрезкой (если настроено в csproj)
        run: dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o ./publish-win

      - name: Upload EXE to Release
        uses: softprops/action-gh-release@v1
        with:
          files: ./publish-win/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # --- СБОРКА LINUX (DEB) ---
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish Linux Binaries
        run: dotnet publish -c Release -r linux-x64 --self-contained true -p:PublishSingleFile=true -o ./temp-bin

      - name: Build DEB Package
        run: |
          # 1. Получаем чистую версию (v1.0.0 -> 1.0.0)
          CLEAN_VERSION=$(echo ${GITHUB_REF_NAME} | sed 's/v//')
          
          # 2. Подставляем версию в ваш файл control
          sed -i "s/^Version:.*$/Version: $CLEAN_VERSION/" ./observerlm-deb/DEBIAN/control
          
          # 3. Подготовка структуры и прав
          mkdir -p ./observerlm-deb/usr/local/bin/
          cp ./temp-bin/observerLm ./observerlm-deb/usr/local/bin/
          chmod +x ./observerlm-deb/usr/local/bin/observerLm
          chmod -R 755 ./observerlm-deb/DEBIAN/
          
          # 4. Сборка пакета
          dpkg-deb --build observerlm-deb "observerlm-${CLEAN_VERSION}-linux-x64.deb"

      - name: Upload DEB to Release
        uses: softprops/action-gh-release@v1
        with:
          files: "*.deb"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
